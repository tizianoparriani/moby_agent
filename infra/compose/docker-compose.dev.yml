version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "[localhost](http://localhost:6333/healthz)"]
      interval: 10s
      timeout: 3s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:v1.8
    container_name: meilisearch
    environment:
      - MEILI_ENV=development
      - MEILI_MASTER_KEY=${MEILISEARCH_MASTER_KEY}
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--spider", "[localhost](http://localhost:7700/health)"]
      interval: 10s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server --console-address ":9001" /data
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "[localhost](http://localhost:9000/minio/health/ready)"]
      interval: 10s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ../../
      dockerfile: infra/compose/Dockerfile.api
    container_name: api
    env_file:
      - ../../.env
    depends_on:
      qdrant:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8000:8000"

  ui:
    build:
      context: ../../
      dockerfile: infra/compose/Dockerfile.ui
    container_name: ui
    env_file:
      - ../../.env
    depends_on:
      api:
        condition: service_started
    ports:
      - "${UI_PORT}:8501"

volumes:
  qdrant_data:
  meili_data:
  minio_data:
