services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  meilisearch:
    image: getmeili/meilisearch:v1.8
    container_name: meilisearch
    environment:
      - MEILI_ENV=development
      - MEILI_MASTER_KEY=${MEILISEARCH_MASTER_KEY}
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server --console-address ":9001" /data
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    build:
      context: ../../
      dockerfile: infra/compose/Dockerfile.api
    container_name: api
    env_file:
      - ../../.env
    depends_on:
      - qdrant
      - meilisearch
      - minio
    ports:
      - "8000:8000"
    volumes:
      - db_data:/data

  ui:
    build:
      context: ../../
      dockerfile: infra/compose/Dockerfile.ui
    container_name: ui
    env_file:
      - ../../.env
    environment:
      # Reach the API by its compose service name, not localhost.
      - API_URL=http://api:8000
    depends_on:
      - api
    ports:
      - "${UI_PORT}:8501"

volumes:
  qdrant_data:
  meili_data:
  minio_data:
  db_data:
